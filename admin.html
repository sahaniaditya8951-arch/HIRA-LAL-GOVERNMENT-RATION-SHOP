<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कोटेदार एडमिन पैनल</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; margin-bottom: 20px; }
        h2 { color: #ff6600; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: #003399; color: white; border: none; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; cursor: pointer; }
        .btn-green { background: #28a745; }
    </style>
</head>
<body>
    <div class="card">
        <h2>नमस्ते आदित्य!</h2>
        <label>वितरण की स्थिति:</label>
        <select id="status">
            <option value="📢 दुकान खुली है: राशन वितरण चालू है">खुली है</option>
            <option value="🔒 दुकान बंद है: अभी वितरण नहीं हो रहा">बंद है</option>
        </select>
        <label>अंतिम तिथि (Deadline):</label>
        <input type="text" id="deadline" placeholder="उदा: 20 अप्रैल 2026">
        <label>विशेष सूचना (Bheed Control):</label>
        <textarea id="notice" placeholder="उदा: आज वार्ड 1 और 2 के लोग आएं"></textarea>
        <button onclick="updateGeneral()">सामान्य जानकारी अपडेट करें</button>
    </div>

    <div class="card">
        <h3>📋 राशन वितरण एंट्री</h3>
        <p>किसने राशन ले लिया, यहाँ अपडेट करें:</p>
        <input type="text" id="cardNo" placeholder="कार्ड के अंतिम 4 अंक डालें">
        <select id="received">
            <option value="✅ राशन मिल चुका है">राशन मिल गया</option>
            <option value="⏳ अभी नहीं मिला है">अभी नहीं मिला</option>
        </select>
        <button class="btn-green" onclick="updateUserStatus()">स्टेटस अपडेट करें</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        var firebaseConfig = { databaseURL: "https://ration-admin-68b62-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        function updateGeneral() {
            var s = document.getElementById('status').value;
            var d = document.getElementById('deadline').value;
            var n = document.getElementById('notice').value;
            database.ref('liveData').update({ status: s, deadline: d, notice: n })
            .then(() => { alert("Website Update Ho Gayi!"); });
        }

        function updateUserStatus() {
            var id = document.getElementById('cardNo').value;
            var res = document.getElementById('received').value;
            if(id.length < 4) { alert("4 digit daliye"); return; }
            database.ref('delivery/' + id).set({ status: res, date: new Date().toLocaleString('hi-IN') })
            .then(() => { alert("Card " + id + " Updated!"); document.getElementById('cardNo').value=""; });
        }
    </script>
</body>
</html>
