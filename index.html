        // Firebase Sync
        var firebaseConfig = { databaseURL: "https://ration-admin-68b62-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        // Listen for live updates
        database.ref('liveData').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('liveStatus').innerText = data.status;
                document.getElementById('liveDeadline').innerText = "वितरण की अंतिम तिथि: " + data.deadline;
                document.getElementById('liveNotice').innerText = data.notice || "";
            }
        });

        function checkRation() {
            const input = document.getElementById('userInput').value.toLowerCase();
            const resBox = document.getElementById('resBox');
            
            if(input === "") { alert("कृपया नाम या कार्ड नंबर भरें"); return; }

            const found = rationList.find(item => item.id.includes(input) || item.n.includes(input));

            if (found) {
                resBox.style.display = "block";
                document.getElementById('rName').innerText = found.n;
                document.getElementById('rID').innerText = "****" + found.id;
                
                // Get delivery status from Firebase
                database.ref('delivery/' + found.id).once('value', (snap) => {
                    const delivery = snap.val();
                    if(delivery) {
                        document.getElementById('rDist').innerText = delivery.status;
                        document.getElementById('rDist').style.color = delivery.status.includes("✅") ? "green" : "red";
                    } else {
                        document.getElementById('rDist').innerText = "⏳ अभी नहीं मिला है (Pending)";
                        document.getElementById('rDist').style.color = "red";
                    }
                });
            } else {
                alert("डाटा नहीं मिला।");
                resBox.style.display = "none";
            }
        }
