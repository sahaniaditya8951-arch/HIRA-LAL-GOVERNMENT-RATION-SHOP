<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hira Lal Ration Shop - Grahak List</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #007bff; color: white; }
        .btn-copy { margin-top: 15px; width: 100%; padding: 10px; background-color: #ff9800; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .btn-copy:hover { background-color: #e68a00; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center;">Grahako ki List</h2>
        <button class="btn-copy" onclick="copyAllNumbers()">Saare Mobile Numbers Copy Karein (SMS ke liye)</button>
        
        <table id="customerTable">
            <thead>
                <tr>
                    <th>Naam</th>
                    <th>Ration Card</th>
                    <th>Mobile Number</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        // Aapka Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyB5D3yJNtucTP7KDNbf-P6oI7D6sWGRYjU",
          authDomain: "customer-data-76bed.firebaseapp.com",
          projectId: "customer-data-76bed",
          storageBucket: "customer-data-76bed.firebasestorage.app",
          messagingSenderId: "769732738494",
          appId: "1:769732738494:web:fc970f3a20473357e68def",
          measurementId: "G-FBXMMBFL6F"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allNumbers = [];

        // Database se data lana
        db.collection("customers").orderBy("dateAdded", "desc").get().then((querySnapshot) => {
            const tbody = document.querySelector("#customerTable tbody");
            querySnapshot.forEach((doc) => {
                let data = doc.data();
                allNumbers.push(data.mobileNumber); // Numbers ko list mein save karna
                
                let row = `<tr>
                    <td>${data.name}</td>
                    <td>${data.rationNumber}</td>
                    <td>${data.mobileNumber}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        });

        // Saare numbers ek sath copy karne ka function
        function copyAllNumbers() {
            if(allNumbers.length === 0) {
                alert("Abhi tak koi data nahi hai!");
                return;
            }
            let numbersString = allNumbers.join(","); // Comma lagakar numbers jodna (eg: 9876.., 9875..)
            navigator.clipboard.writeText(numbersString).then(() => {
                alert("✅ Saare numbers copy ho gaye hain! Ab aap inhe SMS wale box mein paste kar sakte hain.");
            });
        }
    </script>
</body>
</html>
