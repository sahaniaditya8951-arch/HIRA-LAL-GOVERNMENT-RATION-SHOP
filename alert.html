<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hira Lal Ration Portal - WhatsApp Alerts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .portal-card { background-color: #ffffff; width: 100%; max-width: 450px; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); }
        .portal-card h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; font-size: 24px; }
        .portal-card p { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .msg-preview { background-color: #e8f8f5; padding: 15px; border-radius: 5px; font-size: 14px; color: #2c3e50; margin-bottom: 20px; border-left: 4px solid #25D366; line-height: 1.5; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #34495e; font-weight: 500; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 5px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        .input-group input:focus { border-color: #25D366; }
        
        /* WhatsApp Green Color for Button */
        .send-btn { width: 100%; padding: 14px; background-color: #25D366; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .send-btn:hover { background-color: #1DA851; }
        
        #statusMessage { text-align: center; margin-top: 15px; font-weight: bold; font-size: 14px; padding: 10px; border-radius: 5px; display: none; }
        .error { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; display: block !important; }
    </style>
</head>
<body>

    <div class="portal-card">
        <h2>WhatsApp Alert System</h2>
        <p>Send free automated reminders via WhatsApp.</p>
        
        <div class="msg-preview">
            <strong>Message Preview:</strong><br>
            "Namaste, Aapka is mahine ka ration abhi tak utha nahi hai. Kripya jald se jald ration prapt karein."
        </div>

        <div class="input-group">
            <label for="mobileNumber">Customer Mobile Number</label>
            <input type="tel" id="mobileNumber" placeholder="Enter 10-digit number" maxlength="10" autocomplete="off" required>
        </div>
        
        <button class="send-btn" onclick="sendWhatsApp()">
            SEND WHATSAPP ALERT
        </button>

        <div id="statusMessage"></div>
    </div>

    <script>
        function sendWhatsApp() {
            const numberInput = document.getElementById('mobileNumber');
            const number = numberInput.value.trim();
            const statusDiv = document.getElementById('statusMessage');

            // Pehle ke error messages hata do
            statusDiv.className = "";
            statusDiv.innerHTML = "";

            // Check karo ki number 10 digit ka hai ya nahi
            if(number.length !== 10 || isNaN(number)) {
                statusDiv.innerHTML = "Please enter a valid 10-digit mobile number.";
                statusDiv.className = "error";
                numberInput.focus();
                return;
            }

            // Jo message bhejna hai
            const message = "Namaste, Aapka is mahine ka ration abhi tak utha nahi hai. Kripya jald se jald ration prapt karein.";

            // WhatsApp ka Direct Link (India code 91 ke sath)
            const whatsappUrl = "https://wa.me/91" + number + "?text=" + encodeURIComponent(message);

            // Naye tab mein WhatsApp khol do
            window.open(whatsappUrl, '_blank');
            
            // Box ko khali kar do agle number ke liye
            numberInput.value = ""; 
        }
    </script>
</body>
</html>
